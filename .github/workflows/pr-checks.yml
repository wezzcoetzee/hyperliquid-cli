name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee /tmp/lint-output.txt
        continue-on-error: true

      - name: Test
        id: test
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/test-output.txt
        continue-on-error: true

      - name: Post results as PR comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const strip = (s) => s.replace(/\x1b\[[0-9;]*m/g, '');

            const lintRaw = strip(fs.readFileSync('/tmp/lint-output.txt', 'utf8').trim());
            const testRaw = strip(fs.readFileSync('/tmp/test-output.txt', 'utf8').trim());

            const lintOk = '${{ steps.lint.outcome }}' === 'success';
            const testOk = '${{ steps.test.outcome }}' === 'success';
            const allOk = lintOk && testOk;

            const summaryLines = testRaw.split('\n').filter(l =>
              l.match(/Test Files|^\s+Tests\s|Duration/)
            );
            const testSummary = summaryLines.join('\n') || testRaw.slice(-300);

            const icon = (ok) => ok ? '✅' : '❌';

            const body = [
              `<!-- pr-checks-comment -->`,
              `## ${allOk ? '✅' : '❌'} PR Checks`,
              '',
              `| Check | Status |`,
              `|-------|--------|`,
              `| Lint  | ${icon(lintOk)} ${lintOk ? 'Passed' : 'Failed'} |`,
              `| Tests | ${icon(testOk)} ${testOk ? 'Passed' : 'Failed'} |`,
              '',
              '```',
              testSummary,
              '```',
              '',
              !lintOk ? [
                '<details>',
                '<summary>Lint output</summary>',
                '',
                '```',
                lintRaw.slice(-4000),
                '```',
                '',
                '</details>',
                '',
              ].join('\n') : '',
              !testOk ? [
                '<details>',
                '<summary>Full test output</summary>',
                '',
                '```',
                testRaw.slice(-8000),
                '```',
                '',
                '</details>',
              ].join('\n') : '',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('<!-- pr-checks-comment -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if checks failed
        if: steps.lint.outcome == 'failure' || steps.test.outcome == 'failure'
        run: exit 1
